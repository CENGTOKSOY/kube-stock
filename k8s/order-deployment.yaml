# --- 1. AĞ SERVİSİ (Service) ---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  type: NodePort
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---

# --- 2. DAĞITIM (Deployment) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: kube-stock-order-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq:5672"
        - name: DB_URL
          value: "postgresql://admin:password123@postgres:5432/kubestock"